<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
  <div class="login-body">
<div class="login-container">
    <div class="login-box">
        <img src="assets/logo login ms3.png" alt="logo chill" class="logo">
        
        <h2>Masuk</h2>
        <p>selamat datang kembali</p>
        <form action="INDEX.HTML" method="POST" class="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>

            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Masukkan kata sandi" required>
                    <span class="toggle-password">👁️</span>
                </div>
            </div>

            <div class="form-links">
                <span class="register-text">Belum punya akun? <a href="Register.html">Daftar</a></span>
                <a href="#" class="forgot-link">Lupa kata sandi?</a>
            </div>

            <button type="submit" class="btn-submit">Masuk</button>
            <p class="divider-text">Atau</p>

            <button type="button" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" class="google-icon">
                Masuk dengan Google
            </button>
        </form>
</div>
</div>

  </body>
</html>
