<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-body">
      <div class="login-container">
        <div class="login-box">
          <img src="assets/logo login ms3.png" alt="logo chill" class="logo" />

          <h2>Masuk</h2>
          <p class="sub-text">Selamat datang kembali!</p>

          <form class="login-form">
            <div class="input-group">
              <label for="usename">Username</label>
              <input
                type="text"
                id="usename"
                placeholder="Masukan username"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Kata Sandi</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  placeholder="Masukkan kata sandi"
                  required
                />
                <span class="toggle-password">👁️‍🗨️</span>
              </div>
            </div>

            <div class="form-options">
              <p class="register-text">
                Belum punya akun? <a href="Register.html">Daftar</a>
              </p>
              <a href="#" class="forgot-password">Lupa kata sandi?</a>
            </div>
            <button type="button" class="btn-submit" onclick="window.location.href='BERANDA.html'">
    Masuk
</button>
            <div class="divider">
              <span>Atau</span>
            </div>

            <button type="button" class="btn-google">
              <img
                src="https://www.svgrepo.com/show/475656/google-color.svg"
                alt="Google Logo"
                class="google-icon"
              />
              Masuk dengan Google
            </button>
          </form>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
